name: Frontend CI/CD

on:
  push:
    branches:
      - dev
    paths:
      - "app/frontend/**"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  ROLE_TO_ASSUME: arn:aws:iam::536376965240:role/production-cloud-platform-dev-github-actions-role
  FRONTEND_BUCKET: production-cloud-platform-dev-frontend
  CLOUDFRONT_DISTRIBUTION_ID: ED0PC1ZWAKP04

jobs:
  frontend-deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}

      - name: Sync frontend to S3
        run: |
          aws s3 sync app/frontend s3://${{ env.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"